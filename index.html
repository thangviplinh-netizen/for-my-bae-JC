<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Future 💖</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffd6e0, #ffe6f0);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    .container {
      padding: 20px;
      max-width: 420px;
      animation: fadeIn 1s ease;
    }

    h1 {
      font-size: 1.6rem;
      color: #ff4d6d;
    }

    .emoji {
      font-size: 3rem;
      margin-bottom: 10px;
      animation: bounce 2s infinite;
    }

    .choices {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      padding: 14px;
      font-size: 15px;
      border: none;
      border-radius: 12px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover { transform: scale(1.08); }
    button:active { transform: scale(0.95); }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-100vh); opacity: 0; }
    }

    @keyframes glow {
      0% { text-shadow: 0 0 5px #fff; }
      50% { text-shadow: 0 0 20px #ff4d6d; }
      100% { text-shadow: 0 0 5px #fff; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes fadeText {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .floating {
      position: fixed;
      font-size: 18px;
      animation: floatUp 4s linear;
    }

    .glow { animation: glow 2s infinite; }

    .final-text {
      opacity: 0;
      animation: fadeText 2s ease forwards;
    }

    .delay1 { animation-delay: 0.5s; }
    .delay2 { animation-delay: 2s; }
    .delay3 { animation-delay: 3.5s; }
  </style>
</head>

<body>
  <div class="container" id="app">
    <div class="emoji" id="emoji">👨‍❤️‍👨</div>
    <h1 id="question" class="glow"></h1>
    <div class="choices" id="choices"></div>
  </div>

  <audio autoplay loop>
    <source src="moonlight.mp3" type="audio/mpeg">
  </audio>

  <script>
    const app = document.getElementById("app");
    const question = document.getElementById("question");
    const choicesDiv = document.getElementById("choices");
    const emoji = document.getElementById("emoji");

    let step = 0;

    const emojis = ["👨‍❤️‍👨","💑","👬","💞","💖","❤️‍🔥"];

    const story = [
      { q: "Next plan of ours? 💖", choices: ["🍜 Go eat", "🎬 Watch movie"] },
      { q: "What vibe today? ✨", choices: ["☕ Chill", "🎢 Exciting"] },
      { q: "Pick a place 🌍", choices: ["🏝️ Beach", "⛰️ Mountains"] },
      { q: "Date style? 💕", choices: ["🍷 Romantic", "😂 Funny"] },
      { q: "What time? ⏰", choices: ["🌅 Morning", "🌙 Night"] },
      { q: "How should we go? 🚶", choices: ["🚶 Walk together", "🛵 Ride together"] },
      { q: "Food mood? 🍽️", choices: ["😋 Street food", "🍝 Fancy"] },
      { q: "Music? 🎧", choices: ["💕 Love songs", "🎶 Chill"] },
      { q: "Outfit? 👕", choices: ["😳 Cute", "😎 Cool"] },
      { q: "Final choice 🥺", choices: ["💖 You", "💘 Still you"] },
      { q: "Are you willing to go with me to every places in the world? 🌎", choices: ["Yes 💞", "Of course 💖"] }
    ];

    const cuteIcons = ["✨","⭐","💫","💖","🌙","🔥"];

    function createFloating() {
      const el = document.createElement("div");
      el.className = "floating";
      el.innerHTML = cuteIcons[Math.floor(Math.random()*cuteIcons.length)];
      el.style.left = Math.random() * window.innerWidth + "px";
      el.style.top = "100%";
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    setInterval(createFloating, 250);

    function renderStep() {
      if (step >= story.length) {
        app.innerHTML = `
          <div class="emoji">👨‍❤️‍👨</div>
          <h1 style="font-size:1.8rem;color:#ff4d6d">
            <div class="final-text delay1">Anywhere is ok... 💕</div>
            <div class="final-text delay2">as long as with you 💖</div>
            <div class="final-text delay3">Mahal Kita! ❤️</div>
          </h1>
        `;
        return;
      }

      question.innerText = story[step].q;
      emoji.innerText = emojis[Math.floor(Math.random()*emojis.length)];

      choicesDiv.innerHTML = "";

      story[step].choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.innerText = choice;
        btn.onclick = () => {
          step++;
          renderStep();
        };
        choicesDiv.appendChild(btn);
      });
    }

    renderStep();
  </script>
</body>
</html>
